server:
  port: 8080
  address: 0.0.0.0


spring:
  application:
    name: program_platform_backend

  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/oj_platform?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456

  # Jackson 配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null

  # Spring MVC 配置
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

# MyBatis 配置
mybatis:
  # 实体类别名包路径
  type-aliases-package: com.itheim.program_platform_backend.domain.po
  # Mapper XML 文件路径
  mapper-locations: classpath:mapper/*.xml
  configuration:
    # 开启驼峰命名映射
    map-underscore-to-camel-case: true
    # 开启日志打印SQL（开发环境）
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT 配置
jwt:
  # 密钥（至少32位）
  secret: mySecretKeyForJwtTokenGeneration2024!
  # 过期时间（单位：毫秒）默认7天
  expiration: 604800000
  # Token 请求头名称
  header: token

# 日志配置
logging:
  level:
    root: INFO
    com.itheim.program_platform_backend: DEBUG
    com.itheim.program_platform_backend.mapper: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"

# Knife4j 配置
knife4j:
  enable: true
  setting:
    language: zh-CN

#阿里云OSS
aliyun:
  oss:
    access-key-id: LTAI5tD59sFzNgfCrcK8DKZk
    access-key-secret: QuVS3J8b0fT54VQ0jmt2mGxD7F5wnv
    endpoint: https://oss-cn-beijing.aliyuncs.com
    bucketName: oj-platform-smp2
    region: cn-beijing

# 火山大模型 配置
volc:
  ark:
    # 你的 API Key，建议通过环境变量 ARK_API_KEY 注入
    api-key: ${ARK_API_KEY:ark-e52208a6-6d3b-4967-80dd-7e0de4ba5852-68281}
    # 模型接入点 (Model ID)，替换为你在控制台创建的 Endpoint ID
    model: doubao-seed-2-0-pro-260215
    base-url: https://ark.cn-beijing.volces.com/api/v3
    timeout: 200000

judge:
  #绝对路径，需要修改
  script-path: C:/Users/27584/Desktop/SPM26-2/SPM26-2/Docker/judger-docker/
  temp-task-root: C:/tmp/judge-tasks/
  default-time-limit: 5
  default-memory-limit: 256m
  command-timeout: 30
  keep-temp-files: false

  languages:
    cpp:
      docker-image: gcc-judge:latest
      script-file: judge_cpp.sh
      source-file-name: main.cpp
    java:
      docker-image: java-judge:latest
      script-file: judge_java.sh
      source-file-name: Main.java
    python:
      docker-image: python-judge:latest
      script-file: judge_python.sh
      source-file-name: main.py

# 文件存储配置
file-storage:
  test-case-root: src/main/resources/testcases/


server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      force: true

spring:
  application:
    name: program_platform_backend
  
  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/oj_platform?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
  
  # Jackson 配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null
  
  # Spring MVC 配置
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

# MyBatis 配置
mybatis:
  # 实体类别名包路径
  type-aliases-package: com.itheim.program_platform_backend.domain.po
  # Mapper XML 文件路径
  mapper-locations: classpath:mapper/*.xml
  configuration:
    # 开启驼峰命名映射
    map-underscore-to-camel-case: true
    # 开启日志打印SQL（开发环境）
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT 配置
jwt:
  # 密钥（至少32位）
  secret: mySecretKeyForJwtTokenGeneration2024!
  # 过期时间（单位：毫秒）默认7天
  expiration: 604800000
  # Token 请求头名称
  header: token

# 日志配置
logging:
  level:
    root: INFO
    com.itheim.program_platform_backend: DEBUG
    com.itheim.program_platform_backend.mapper: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"

# Knife4j 配置
knife4j:
  enable: true
  setting:
    language: zh-CN

# 火山大模型 配置
volc:
  ark:
    # 你的 API Key，建议通过环境变量 ARK_API_KEY 注入
    api-key: ${ARK_API_KEY:ark-e52208a6-6d3b-4967-80dd-7e0de4ba5852-68281}
    # 模型接入点 (Model ID)，替换为你在控制台创建的 Endpoint ID
    model: doubao-seed-2-0-pro-260215
    base-url: https://ark.cn-beijing.volces.com/api/v3
    timeout: 80000

# 判题oj 配置
judge:
  # 必须修改为你本地存放 judge.sh 的目录
  script-path: D:/judge-docker/
  # 临时任务根目录（自动创建）
  temp-task-root: D:/judge-docker/tasks/
  # Docker镜像名称（和你本地构建的一致）
  docker-image: judge-cpp:latest
  # 默认评测限制
  default-time-limit: 5
  default-memory-limit: 256m
  # 命令执行超时（比评测时间多10秒缓冲）
  command-timeout: 15
  # 调试时设为true，保留临时文件
  keep-temp-files: false
